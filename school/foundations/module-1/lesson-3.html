<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foundations • Lesson 3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../../theme.css">
<meta name="theme-color" content="#0b0f1a">

<style>
.ms-lessonGrid{display:grid;gap:14px;margin-top:14px}
.hack-box{background:rgba(34,211,238,.08);border-left:4px solid rgba(34,211,238,.6);padding:16px;border-radius:12px;font-weight:600}
.big{font-size:28px;font-weight:800;text-align:center}
</style>
</head>

<body>
<header class="ms-top"><div class="ms-nav"><span>MindStrong Universe</span></div></header>

<main class="ms-wrap">
<section class="ms-hero">
<h1 class="ms-h1">Lesson 3 — Expanded Form</h1>
<p class="ms-sub">Numbers are built from blocks.</p>
<button id="completeBtn" class="ms-btn primary">Mark Complete ✓</button>
</section>

<div class="ms-lessonGrid">

<section class="ms-card">
<h2>The Hack</h2>
<div class="hack-box">
Every digit lives in a place.<br>
Expanded form shows the blocks.
</div>
</section>

<section class="ms-card">
<h2>🎮 Play Mode — Number LEGO</h2>

<input id="numInput" type="number" value="432" style="width:100%;padding:8px">

<div class="big" id="expanded"></div>

</section>

<section class="ms-card">
<h2>Exit Check</h2>
<p>Explain 507 in expanded form.</p>
</section>

</div>
</main>

<script>
const LESSON_NUM=3,KEY="ms_m1_done";
const btn=document.getElementById("completeBtn");

btn.onclick=()=>{
  const a=JSON.parse(localStorage.getItem(KEY)||"[]");
  if(!a.includes(LESSON_NUM)){a.push(LESSON_NUM)}
  localStorage.setItem(KEY,JSON.stringify(a));
  btn.textContent="Completed ✓";
};

const input=document.getElementById("numInput");
const out=document.getElementById("expanded");

function expand(n){
  return n.toString().split("").map((d,i,a)=>{
    const p=Math.pow(10,a.length-i-1);
    return d*p;
  }).join(" + ");
}
input.oninput=()=>out.textContent=expand(input.value);
out.textContent=expand(input.value);
</script>
</body>
</html>
