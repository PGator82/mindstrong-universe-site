<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MindStrong School</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../theme.css" />
</head>

<body>

<header class="ms-top">
  <div class="ms-nav">
    <div class="ms-brand">
      <span class="ms-dot"></span>
      <span>MindStrong Universe</span>
    </div>
    <nav class="ms-links">
      <a class="ms-link" href="../index.html">Home</a>
      <a class="ms-link is-active" href="./index.html">School</a>
    </nav>
  </div>
</header>

<main class="ms-wrap">

  <!-- HERO -->
  <section class="ms-hero">
    <span class="ms-kicker">🎓 Online School</span>
    <h1 class="ms-h1">Your Learning Dashboard</h1>
    <p class="ms-sub">
      Track progress. Unlock courses. Build mastery.
    </p>
  </section>

  <!-- STUDENT PROFILE -->
  <section class="ms-card">
    <h2>Student Profile</h2>
    <div id="profilePanel"></div>
  </section>

  <!-- FOUNDATIONS -->
  <section class="ms-card">
    <h2>Foundations</h2>

    <div class="ms-item">
      <div class="ms-row">
        <span class="ms-badge" id="m1Badge">1</span>
        <div>
          <div class="ms-title">Module 1 — Number Sense</div>
          <div class="ms-subtle">6 Lessons</div>
        </div>
      </div>

      <a class="ms-btn" href="./foundations/index.html">
        Open →
      </a>
    </div>
  </section>

  <!-- PRE-ALGEBRA -->
  <section class="ms-card">
    <h2>Pre-Algebra Mastery</h2>

    <div class="ms-item">
      <div class="ms-row">
        <span class="ms-badge" id="preBadge">🔒</span>
        <div>
          <div class="ms-title">Ratios</div>
          <div class="ms-subtle">Competitive lesson</div>
        </div>
      </div>

      <button class="ms-btn" id="preBtn" disabled>
        Locked
      </button>
    </div>
  </section>

  <footer class="ms-footer">
    © MindStrong Universe
  </footer>

</main>

<script>
/* ================================
   LOAD PROGRESS
================================ */

const m1 = JSON.parse(localStorage.getItem("ms_m1_done") || "[]");
const rank = localStorage.getItem("ms_ratio_rank");

/* Student Profile Panel */
document.getElementById("profilePanel").innerHTML = `
  <div>Module 1 Completed: ${m1.length}/6</div>
  <div>Ratio Rank: ${rank || "None"}</div>
`;

/* Module 1 Complete Badge */
if(m1.length === 6){
  document.getElementById("m1Badge").textContent = "✓";
  document.getElementById("m1Badge").classList.add("ms-check");

  /* Unlock Pre-Algebra */
  document.getElementById("preBadge").textContent = "→";
  document.getElementById("preBtn").outerHTML =
    '<a class="ms-btn primary" href="./foundations/pre-algebra/">Open →</a>';
}

/* If Ratios beaten */
if(rank){
  document.getElementById("preBadge").textContent = "✓";
  document.getElementById("preBadge").classList.add("ms-check");
}
</script>

</body>
</html>
