<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindStrong Admin</title>

<style>

body{
font-family:Arial;
background:#05050f;
color:white;
margin:0;
}

header{
background:#161b22;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
padding:10px 20px;
background:#7c3aed;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h2>MindStrong Universe Admin</h2>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h2>124</h2>
<p>Students</p>
</div>

<div class="card">
<h2>8</h2>
<p>Teachers</p>
</div>

<div class="card">
<h2>16</h2>
<p>Courses</p>
</div>

<div class="card">
<h2>3210</h2>
<p>Total XP</p>
</div>

</div>

</div>

<script>

const session=JSON.parse(localStorage.getItem("ms_session")||"{}")

if(!session.loggedIn || session.role!=="admin"){

alert("Access denied")
window.location.href="login.html"

}

function logout(){

localStorage.removeItem("ms_session")
window.location.href="login.html"

}

</script>

</body>
</html>
