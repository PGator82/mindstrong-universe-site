<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindStrong Login</title>

<style>
body{
font-family:Arial;
background:#0b0b1f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#161b22;
padding:40px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
background:#7c3aed;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

select{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>MindStrong Login</h2>

<form onsubmit="login(event)">

<input id="email" placeholder="Email" required>

<input id="password" type="password" placeholder="Password" required>

<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
<option value="parent">Parent</option>
<option value="admin">Admin</option>
</select>

<button type="submit">Login</button>

</form>

</div>

<script>

function login(e){

e.preventDefault()

let email = document.getElementById("email").value
let role = document.getElementById("role").value

let session = {
email:email,
role:role,
loggedIn:true
}

localStorage.setItem("ms_session",JSON.stringify(session))

let redirect = {
student:"pages/dashboard.html",
teacher:"pages/teacher.html",
parent:"pages/parent.html",
admin:"pages/admin.html"
}

window.location.href = redirect[role]

}

</script>

</body>
</html>
